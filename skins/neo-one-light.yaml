  [bold #4a6235]████╗  ██║██╔════╝██╔═══██╗      ██╔═══██╗████╗  ██║██╔════╝[/]
  [bold #5a7142]██╔██╗ ██║█████╗  ██║   ██║█████╗██║   ██║██╔██╗ ██║█████╗  [/]

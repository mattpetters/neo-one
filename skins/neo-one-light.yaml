name: neo-one-light
description: Neo-One Light — matrix phosphor-burn on warm paper (cream base, layered forest greens). Same code-rain braille hero, inverted for daylight terminals.

# Palette reference (mactop-lime inverted to light surface):
#   bg            #f5f2e8    bg_panel    #ede9db
#   bg_alt        #faf9f3    bg_status   #e8e4d5    bg_visual #d5d3c0
#   fg            #2a3818    fg_dim      #4a6235    fg_dimmer #7a8a5f
#   primary       #3d4f2b    accent      #5a7142    accent2   #6b8454
#   accent3       #4a6235    danger      #7a4a3a    magenta   #5a4a5a    cyan #4a6a5a

colors:
  # Banner — dark phosphor calligraphy on warm paper
  banner_border: "#5a7142"
  banner_title:  "#2a3818"
  banner_accent: "#3d4f2b"
  banner_dim:    "#7a8a5f"
  banner_text:   "#2a3818"

  # Core UI
  ui_accent: "#3d4f2b"
  ui_label:  "#4a6a5a"
  ui_ok:     "#4a6235"
  ui_error:  "#7a4a3a"
  ui_warn:   "#6b8454"

  # Prompt + rules
  prompt:          "#2a3818"
  input_rule:      "#d5d3c0"
  response_border: "#5a7142"

  # Session header
  session_label:  "#3d4f2b"
  session_border: "#7a8a5f"

  # Status bar (cream panel above warm bg)
  status_bar_bg:       "#e8e4d5"
  status_bar_text:     "#2a3818"
  status_bar_strong:   "#3d4f2b"
  status_bar_dim:      "#7a8a5f"
  status_bar_good:     "#4a6235"
  status_bar_warn:     "#6b8454"
  status_bar_bad:      "#7a4a3a"
  status_bar_critical: "#7a4a3a"

  # Voice / completion menus
  voice_status_bg:                  "#e8e4d5"
  completion_menu_bg:               "#faf9f3"
  completion_menu_current_bg:       "#ede9db"
  completion_menu_meta_bg:          "#faf9f3"
  completion_menu_meta_current_bg:  "#e8e4d5"

spinner: {}

branding:
  agent_name: "Hermes Agent"
  welcome: "ようこそ — Neo-One Light. The Matrix in daylight. Type /help."
  goodbye: "またね 〜 ⚕"
  response_label: " ⚕ Hermes "
  prompt_symbol: "❯ "
  help_header: "(^_^)? Available Commands"

tool_prefix: "│"


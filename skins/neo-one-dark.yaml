  banner_border: "#5a7142"
  banner_title:  "#a8c989"
  banner_accent: "#b8d49a"
  banner_dim:    "#3d4f2b"
  banner_text:   "#a8c989"

  # Core UI
  ui_accent: "#a8c989"
  ui_label:  "#7a9a5f"
  ui_ok:     "#b8d49a"
  ui_error:  "#5a4a2a"
  ui_warn:   "#6b8454"

  # Prompt + rules
  prompt:          "#a8c989"
  input_rule:      "#1a2310"
  response_border: "#5a7142"

  # Session header
  session_label:  "#a8c989"
  session_border: "#3d4f2b"

  # Status bar (dark panel above pure black bg)
  status_bar_bg:       "#0d1208"
  status_bar_text:     "#a8c989"
  status_bar_strong:   "#b8d49a"
  status_bar_dim:      "#3d4f2b"
  status_bar_good:     "#b8d49a"
  status_bar_warn:     "#6b8454"
  status_bar_bad:      "#5a4a2a"
  status_bar_critical: "#5a4a2a"

  # Voice / completion menus
  voice_status_bg:                  "#0d1208"
  completion_menu_bg:               "#050a03"
  completion_menu_current_bg:       "#0a0f06"
  completion_menu_meta_bg:          "#050a03"
  completion_menu_meta_current_bg:  "#0d1208"

spinner: {}

branding:
  agent_name: "Hermes Agent"
  welcome: "ようこそ — Neo-One Dark. Follow the white rabbit. Type /help."
